<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Efootball Free Players — Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Efootball Free Players</h1>
      <p class="tagline">Demo frontend: vintage-era football player cards (1924–2000). No accounts, no credentials.</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <div class="control-row">
        <label class="control">
          Search
          <input id="search" type="search" placeholder="Search players by name" />
        </label>
        <label class="control">
          Position
          <select id="positionFilter">
            <option value="all">All</option>
            <option value="GK">GK</option>
            <option value="DEF">DEF</option>
            <option value="MID">MID</option>
            <option value="FWD">FWD</option>
          </select>
        </label>
        <label class="control">
          Sort
          <select id="sortBy">
            <option value="rating-desc">Rating ↓</option>
            <option value="rating-asc">Rating ↑</option>
            <option value="price-asc">Price ↑</option>
            <option value="price-desc">Price ↓</option>
            <option value="name-asc">Name A→Z</option>
          </select>
        </label>
      </div>
      <div class="meta-row">
        <div id="count">Showing 0 players</div>
      </div>
    </section>

    <section id="cards" class="cards-grid" aria-live="polite"></section>

    <footer class="note">
      This is a frontend-only demo. All player data is fictional for learning purposes.
    </footer>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
